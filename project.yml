name: TruvideoSDK
options:
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "15.0"

# Build for all standard architectures so dependencies (e.g. DI) are available for both arm64 and x86_64 simulator
settings:
  ONLY_ACTIVE_ARCH: NO
  ARCHS: $(ARCHS_STANDARD)
  EXCLUDED_ARCHS[sdk=iphonesimulator*]: ""

packages:
  AWSS3:
    url: https://github.com/aws-amplify/aws-sdk-ios-spm
    exactVersion: 2.33.4
  Common:
    url: https://github.com/Truvideo/truvideo-sdk-ios-common
    from: 0.0.78
  TruvideoSdkVideoUtils:
    url: https://github.com/Truvideo/truvideo-sdk-ios-video-utils
    exactVersion: 0.0.3
  SnapshotTesting:
    url: https://github.com/pointfreeco/swift-snapshot-testing
    exactVersion: 1.18.7

targetTemplates:
  cameraExampleDeps:
    dependencies:
      - target: TruvideoSdkCamera
        embed: true
      - target: TruvideoSdk
        embed: true
      - package: Common
        product: Common
      - package: AWSS3
        product: AWSS3
      - package: AWSS3
        product: AWSCore
      - package: AWSS3
        product: AWSCognitoIdentityProvider

targets:
  # Foundation Core (Low-level infrastructure)
  DI:
    type: framework
    platform: iOS
    sources:
      - Libraries/Foundation/Core/DI/Sources
    info:
      path: Libraries/Foundation/Core/DI/Sources/Info.plist
    settings:
      BUILD_LIBRARY_FOR_DISTRIBUTION: YES
      DEFINES_MODULE: YES
      LD_RUNPATH_SEARCH_PATHS: $(inherited) @loader_path/Frameworks @executable_path/Frameworks
      PRODUCT_BUNDLE_IDENTIFIER: com.truvideo.di
      PRODUCT_MODULE_NAME: DI      
      OTHER_LDFLAGS:
        - $(inherited)
        - -ObjC      
    scheme:
      testTargets:
        - DITests
    postCompileScripts:
      - script: |
          if [ "$CONFIGURATION" != "Debug" ]; then
            echo "Skipping SwiftFormat for $CONFIGURATION build"
            exit 0
          fi

          export PATH="/opt/homebrew/bin:$PATH"
          if which swiftformat >/dev/null; then
            swiftformat Libraries --exclude derivedData,.git,.build || echo "SwiftFormat failed, ignoring in this build"
          else
            echo "warning: SwiftFormat not installed, download from https://github.com/nicklockwood/SwiftFormat"
          fi
        name: SwiftFormat
        basedOnDependencyAnalysis: false
      - script: |
          if [ -f /opt/homebrew/bin/swiftlint ]; then
            /opt/homebrew/bin/swiftlint
          elif [ -f /usr/local/bin/swiftlint ]; then
            /usr/local/bin/swiftlint
          elif which swiftlint > /dev/null; then
            swiftlint
          else
            echo "warning: SwiftLint not installed, download from https://github.com/realm/SwiftLint"
          fi
        name: SwiftLint
        basedOnDependencyAnalysis: false

  DITests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Libraries/Foundation/Core/DI/Tests
    dependencies:
      - target: DI
    settings:
      GENERATE_INFOPLIST_FILE: YES

  TruVideoRuntime:
    type: framework
    platform: iOS
    sources:
      - Libraries/Foundation/Core/Runtime/Sources
    info:
      path: Libraries/Foundation/Core/Runtime/Sources/Info.plist
    settings:
      BUILD_LIBRARY_FOR_DISTRIBUTION: YES
      DEFINES_MODULE: YES
      PRODUCT_MODULE_NAME: TruVideoRuntime
      PRODUCT_BUNDLE_IDENTIFIER: com.truvideo.runtime
    scheme:
