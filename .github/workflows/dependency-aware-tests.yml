name: Dependency-Aware Unit Tests

on:
  pull_request:
    branches: [ main, release/* ]
  push:
    branches: [ main, release/* ]

jobs:
  unit-tests:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Required for git diff

      - name: Tooling
        run: |
          brew update >/dev/null
          brew install jq xcodegen >/dev/null || true
          brew install swiftlint
          brew install swiftformat

      - name: Set base ref
        id: base
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "ref=origin/${{ github.base_ref }}" >> $GITHUB_OUTPUT
          else
            echo "ref=HEAD~1" >> $GITHUB_OUTPUT
          fi

      - name: Generate dependency graph
        run: |
          if [ -f project.yml ]; then
            python3 ci/generate_dependencies_from_xcodegen.py
          fi

      - name: Generate Xcode project
        run: |
          set -e
          make genbuild

      - name: Resolve affected test schemes
        id: resolve
        run: |
          python3 ci/resolve_tests.py "${{ steps.base.outputs.ref }}"

      - name: Run unit tests
        if: steps.resolve.outputs.test_schemes != ''
        run: |
          set -euo pipefail
          IFS=',' read -ra SCHEMES <<< "${{ steps.resolve.outputs.test_schemes }}"
          for scheme in "${SCHEMES[@]}"; do
            # Skip test/helper schemes
            if [[ "$scheme" =~ (Tests|Testing)$ ]]; then
              echo "Skipping scheme: $scheme"
              continue
            fi
            echo "Running tests for $scheme"
            xcodebuild test \
              -project TruvideoSDK.xcodeproj \
              -scheme "$scheme" \
              -destination "platform=iOS Simulator,name=iPhone 16" \
              -configuration Debug \
              | xcpretty
          done
