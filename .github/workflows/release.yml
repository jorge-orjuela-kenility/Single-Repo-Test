name: Release


on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    runs-on: macos-15    
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_16.4.app
          xcodebuild -version

      - name: Install tooling
        run: |
          brew install xcodegen || true

      - name: Generate project
        run: make generate

      - name: Build project
        run: make build SIM_DEST="generic/platform=iOS Simulator"