name: Release

on:
  pull_request:
    types: [closed]
    branches:
      - main
      - "release/*"
  workflow_dispatch:
    inputs:
      cut:
        description: "Release type"
        type: choice
        options: [rc, prod]
        required: false

permissions:
  contents: write
  pull-requests: read

jobs:
  build:
    if: |
      (github.event_name == 'pull_request' && github.event.pull_request.merged == true) ||
      (github.event_name == 'workflow_dispatch')
    runs-on: macos-15

    env:
      LBL_RC: cut-rc      
      GH_TOKEN: ${{ secrets.GH_EXTERNAL_PAT }}
      SPM_CLONE_DIR: ${{ github.workspace }}/.spm-checkouts

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Git identity
        shell: bash
        run: |
          set -euo pipefail

          git config user.name  "truvideo[bot]"
          git config user.email "truvideo[bot]@users.noreply.github.com"

      - name: Install tooling
        run: |
          brew install jq xcodegen || true

      - name: Resolve cut type and frameworks
        id: scope
        shell: bash
        run: |
          set -euo pipefail
          chmod +x scripts/resolve_scope.sh
          scripts/resolve_scope.sh

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_16.4.app
          xcodebuild -version

      - name: Cache SwiftPM state
        uses: actions/cache@v4
        with:
          path: |
            .spm-checkouts
            DerivedData
            ~/Library/Caches/org.swift.swiftpm
            ~/Library/Developer/Xcode/SourcePackages
          key: spm-${{ runner.os }}-${{ hashFiles('project.yml', '**/Package.resolved', '**/Package.swift') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: Generate project
        run: make generate

      #- name: Build project
       # run: make build SIM_DEST="generic/platform=iOS Simulator"

      - name: Compute version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          chmod +x scripts/compute_version.sh

          # Load scope file
          if [ -f "$GITHUB_WORKSPACE/.cut_release_scope" ]; then
            source "$GITHUB_WORKSPACE/.cut_release_scope"
          fi

          CUT_FINAL="${CUT:-}"
          if [ -z "$CUT_FINAL" ]; then
            CUT_FINAL="rc"
          fi

          echo "Using CUT=$CUT_FINAL"

          CUT="$CUT_FINAL" ./scripts/compute_version.sh > version.json
          cat version.json

          base="$(jq -r .base version.json)"
          full="$(jq -r .full version.json)"
          channel="$(jq -r .channel version.json)"
          build="$(jq -r .build version.json)"

          # Fail early if parsing failed
          if [ -z "$base" ] || [ "$base" = "null" ]; then
            echo "Version parsing failed."
            exit 1
          fi

          echo "base=$base" >> "$GITHUB_OUTPUT"
          echo "full=$full" >> "$GITHUB_OUTPUT"
          echo "channel=$channel" >> "$GITHUB_OUTPUT"
          echo "build=$build" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Apply version changes
        id: apply
        shell: bash
        run: |
          set -euo pipefail

          if [ ! -f "$GITHUB_WORKSPACE/.cut_release_scope" ]; then
            echo "Missing .cut_release_scope"
            exit 1
          fi
 
          source "$GITHUB_WORKSPACE/.cut_release_scope"

          base="${{ steps.version.outputs.base }}"
          full="${{ steps.version.outputs.full }}"
          channel="${{ steps.version.outputs.channel }}"
          build="${{ steps.version.outputs.build }}"
          
          if [ -z "${AFF:-}" ] || [ -z "$base" ] || [ -z "$full" ] || [ -z "$channel" ] || [ -z "$build" ]; then
            echo "Missing required env vars."
            echo "Required: AFF, VERSION_BASE, VERSION_FULL, CHANNEL, BUILD_NUM"
            exit 1
          fi

          chmod +x ./scripts/apply_version.sh

          AFF="$AFF" \
          VERSION_BASE="$base" \
          VERSION_FULL="$full" \
          CHANNEL="$channel" \
          BUILD_NUM="$build" \
          ./scripts/apply_version.sh

      - name: Generate changelog
        id: changelog
        env:
          VERSION_FULL: ${{ steps.version.outputs.full }}
          CHANNEL: ${{ steps.version.outputs.channel }}
        run: |
         set -Eeuo pipefail
         echo "VERSION_FULL=$VERSION_FULL"
         echo "CHANNEL=$CHANNEL"
         chmod +x ./scripts/changelog.sh
         ./scripts/changelog.sh

          echo "Preview:"
          cat CHANGELOG.md

      - name: Build XCFrameworks
        shell: bash
        run: |
          set -euo pipefail
          chmod +x scripts/build_frameworks.sh
          ./scripts/build_frameworks.sh

      - name: Create tag
        env:
          VERSION_FULL: ${{ steps.version.outputs.full }}
        run: |
          set -Eeuo pipefail

          TAG="${VERSION_FULL:?VERSION_FULL not set}"          

          git fetch --tags

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag already exists: $TAG"
            exit 1
          fi

          git config user.name "kenility-bot"
          git config user.email "bot@kenility.com"

          git tag -a "$TAG" -m "chore(release): internal ${VERSION_FULL}"
          git push origin "$TAG"

      - name: Publish SPM repo
        env:
          VERSION_FULL: ${{ steps.version.outputs.full }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REMOTE_REPO: Truvideo/truvideo-sdk-ios-core 
          REMOTE_BRANCH: main
        run: |
          set -Eeuo pipefail

          : "${VERSION_FULL:?VERSION_FULL not set}"
          : "${GH_TOKEN:?GH_TOKEN not set}"
          
          rm -rf spm-repo
          git clone "https://x-access-token:${GH_TOKEN}@github.com/${REMOTE_REPO}.git" spm-repo
          cd spm-repo
          git checkout "${REMOTE_BRANCH}"
          
          cd "$GITHUB_WORKSPACE"
          
          chmod +x ./scripts/release_checksums.sh
          ./scripts/release_checksums.sh "dist" > checksums.json
          
          chmod +x ./scripts/release_update_package.sh
          ./scripts/release_update_package.sh \
            --repo-dir "spm-repo" \
            --version "$VERSION_FULL" \
            --checksums "checksums.json"
          
          chmod +x ./scripts/release_commit_tag_push.sh
          ./scripts/release_commit_tag_push.sh \
            --repo-dir "spm-repo" \
            --version "$VERSION_FULL" \
            --branch "$REMOTE_BRANCH"
          
          chmod +x ./scripts/release_create_release.sh
          ./scripts/release_create_release.sh \
            --repo "${REMOTE_REPO}" \
            --version "$VERSION_FULL" \
            --notes-file "CHANGELOG.md" \
            --assets-glob "dist/*.xcframework.zip"