name: Release

on:
  pull_request:
    types: [closed]
    branches:
      - main
      - "release/*"
  workflow_dispatch:
    inputs:
      cut:
        description: "Release type"
        type: choice
        options: [rc, prod]
        required: false
      dry_run:
        description: "Preview only"
        type: boolean
        default: false
        required: false

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: cut-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    if: |
      (github.event_name == 'pull_request' && github.event.pull_request.merged == true) ||
      (github.event_name == 'workflow_dispatch')
    runs-on: macos-15

    env:
      LBL_RC: cut-rc
      CHANNEL_PLIST_KEY: "TRVReleaseChannel"
      GH_TOKEN: ${{ secrets.GH_EXTERNAL_PAT }}

      # paths used consistently across resolve/build so Xcode doesn't re-fetch
      DERIVED_DATA: ${{ github.workspace }}/DerivedData
      SPM_CHECKOUTS: ${{ github.workspace }}/.spm-checkouts
      RESOLVE_SCHEME: DI

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_EXTERNAL_PAT }}

      - name: Tooling / Git identity
        shell: bash
        run: |
          set -euo pipefail
          brew update >/dev/null || true
          brew install jq xcodegen swiftlint swiftformat >/dev/null || true
          git config user.name  "truvideo[bot]"
          git config user.email "truvideo[bot]@users.noreply.github.com"

          # harden git network behavior on macOS runners (helps "hangs" during checkout)
          git config --global http.version HTTP/1.1
          git config --global http.lowSpeedLimit 1000
          git config --global http.lowSpeedTime 60
          git config --global http.postBuffer 524288000

      - name: Clone remote repository (external token)
        shell: bash
        run: |
          set -euo pipefail
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch origin --tags

      - name: Validate release policy
        shell: bash
        run: |
          set -euo pipefail

          BASE_BRANCH="${{ github.event.pull_request.base.ref }}"
          LABELS="${{ join(github.event.pull_request.labels.*.name, ' ') }}"

          echo "Base branch: $BASE_BRANCH"
          echo "Labels: $LABELS"

          has_rc=false
          [[ "$LABELS" =~ (^|[[:space:]])cut-rc($|[[:space:]]) ]] && has_rc=true

          if [[ "$BASE_BRANCH" == "release/next" ]]; then
            if ! $has_rc; then
              echo "::notice::No cut-rc label found; skipping release"
              exit 0
            fi
          else
            echo "::notice::Branch $BASE_BRANCH does not trigger releases (only release/next with cut-rc does)"
            exit 0
          fi

          echo "Release policy validated"

      - name: Resolve cut type and frameworks (manual > labels > paths)
        id: scope
        shell: bash
        run: |
          set -euo pipefail

          EVENT_FILE="${GITHUB_EVENT_PATH:-}"
          EVENT_NAME="${GITHUB_EVENT_NAME:-}"

          labels=""
          if [ -n "$EVENT_FILE" ]; then
            labels="$(jq -r '.pull_request.labels[].name // empty' "$EVENT_FILE" 2>/dev/null | sed '/^\s*$/d' || true)"
          fi

          safe_trim() {
            printf "%s" "$1" \
              | tr '\t' ' ' \
              | tr -s ' ' \
              | sed 's/^ *//; s/ *$//'
          }

          cut=""
          if [ "$EVENT_NAME" = "workflow_dispatch" ] && [ -n "$EVENT_FILE" ]; then
            cut="$(jq -r '.inputs.cut // empty' "$EVENT_FILE" 2>/dev/null || true)"
          fi

          if [ -z "$cut" ]; then
            if grep -Fxq "${LBL_RC}" <<< "$labels"; then
              cut="rc"
            fi
          fi

          # Framework allow list (kept from your script)
          allow="$(grep -B 1 'type: framework' "$GITHUB_WORKSPACE/project.yml" 2>/dev/null \
            | grep -E '^  [A-Za-z0-9]+:' \
            | sed 's/^  //; s/:$//' \
            | tr '\n' ' ' \
            | sed 's/ $//')"

          allow="$(safe_trim "$allow")"
          final="$allow"

          dry="false"
          if [ -n "$EVENT_FILE" ]; then
            dry="$(jq -r '.inputs.dry_run // "false"' "$EVENT_FILE" 2>/dev/null || true)"
          fi

          echo "cut=$cut" >> "$GITHUB_OUTPUT"
          echo "aff=$final" >> "$GITHUB_OUTPUT"
          echo "dry=$dry" >> "$GITHUB_OUTPUT"

          SCOPE_FILE="$GITHUB_WORKSPACE/.cut_release_scope"
          echo "CUT=$cut" > "$SCOPE_FILE"
          echo "AFF=\"$final\"" >> "$SCOPE_FILE"
          echo "DRY=$dry" >> "$SCOPE_FILE"
          echo "Wrote scope to $SCOPE_FILE"

      # Cache SwiftPM/Xcode packages (DO NOT delete these right after)
      - name: Cache SwiftPM & Xcode SourcePackages
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/org.swift.swiftpm
            ~/Library/Developer/Xcode/SourcePackages
            ${{ github.workspace }}/.spm-checkouts
          key: spm-${{ runner.os }}-${{ hashFiles('project.yml', 'Package.swift', '**/Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: Prepare build dirs
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${DERIVED_DATA}"
          mkdir -p "${SPM_CHECKOUTS}"

      - name: Generate Xcode project (NO build here)
        timeout-minutes: 20
        shell: bash
        run: |
          set -euo pipefail
          SCOPE_FILE="$GITHUB_WORKSPACE/.cut_release_scope"
          if [ ! -f "$SCOPE_FILE" ]; then
            echo "Scope file not found; exiting (nothing to cut)."
            exit 0
          fi
          source "$SCOPE_FILE"
          if [ -z "${AFF:-}" ]; then
            echo "AFF is empty; skipping."
            exit 0
          fi

          make generate

          if [ -f "TruvideoSDK.xcodeproj/project.pbxproj" ]; then
            proj="TruvideoSDK.xcodeproj"
          else
            proj="$(ls -1 *.xcodeproj 2>/dev/null | head -n1 || true)"
          fi

          if [ -z "$proj" ]; then
            echo "No .xcodeproj found after generation"; exit 1
          fi

          echo "PROJECT=$proj" >> "$GITHUB_ENV"
          echo "Using PROJECT=$proj"

      # ✅ FIX: DO NOT pass -disableAutomaticPackageResolution here
      - name: Resolve SwiftPM dependencies (retry)
        timeout-minutes: 25
        shell: bash
        run: |
          set -euo pipefail

          resolve() {
            xcodebuild -resolvePackageDependencies \
              -project "${PROJECT}" \
              -scheme "${RESOLVE_SCHEME}" \
              -derivedDataPath "${DERIVED_DATA}" \
              -clonedSourcePackagesDirPath "${SPM_CHECKOUTS}"
          }

          for i in 1 2 3; do
            echo "=== Resolve attempt $i/3 ==="
            if resolve; then
              echo "✅ SwiftPM resolved"
              echo "Package.resolved locations (if any):"
              find "${PROJECT}" -path "*swiftpm/Package.resolved" -maxdepth 8 -print || true
              exit 0
            fi
            echo "⚠️ Resolve failed; cleaning only SPM_CHECKOUTS and retrying..."
            rm -rf "${SPM_CHECKOUTS}" || true
            mkdir -p "${SPM_CHECKOUTS}"
            sleep 10
          done

          echo "❌ SwiftPM resolve failed after retries"
          exit 1

      # Now that Package.resolved exists, builds can safely disable automatic resolution
      - name: Build (generate + build are separated)
        timeout-minutes: 60
        shell: bash
        run: |
          set -euo pipefail

          # build just enough to validate the graph first (fast failure)
          xcodebuild \
            -project "${PROJECT}" \
            -scheme DI \
            -sdk iphonesimulator \
            -destination "platform=iOS Simulator,name=iPhone 16,OS=latest" \
            -derivedDataPath "${DERIVED_DATA}" \
            -clonedSourcePackagesDirPath "${SPM_CHECKOUTS}" \
            -disableAutomaticPackageResolution \
            build

          # If you want the full dependency-order build from your Makefile:
          make build SIM_DEST="platform=iOS Simulator,name=iPhone 16,OS=latest"

      - name: Compute versions, update Info.plist, generate Version.swift, tag & release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GH_EXTERNAL_PAT }}
          COCOAPODS_TRUNK_TOKEN: ${{ secrets.COCOAPODS_TRUNK_TOKEN }}
          SDK_NON_PROD_KEY: ${{ secrets.SDK_NON_PROD_KEY }}
          SDK_PROD_KEY: ${{ secrets.SDK_PROD_KEY }}
        run: |
          set -eo pipefail
          trap 'ret=$?; echo "ERROR: command failed with exit $ret: ${BASH_COMMAND} at line ${LINENO}"; exit $ret' ERR

          # load scope vars produced by the scope step
          SCOPE_FILE="$GITHUB_WORKSPACE/.cut_release_scope"
          if [ ! -f "$SCOPE_FILE" ]; then
            echo "Scope file not found; exiting (nothing to cut)."
            exit 0
          fi
          # shellcheck source=/dev/null
          source "$SCOPE_FILE"

          if [ -z "${CUT:-}" ] || [ -z "${AFF:-}" ]; then
            echo "CUT or AFF empty; nothing to do."
            exit 0
          fi

          cut="$CUT"
          dry="$DRY"

          find_plists () { git ls-files "$1" | grep -E '/Info\.plist$' || true; }
          read_short_ver () { /usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" "$1" 2>/dev/null || true; }
          write_short_ver () { /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $2" "$1" || /usr/libexec/PlistBuddy -c "Add :CFBundleShortVersionString string $2" "$1"; }
          write_build_num () { /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $2" "$1" || /usr/libexec/PlistBuddy -c "Add :CFBundleVersion string $2" "$1"; }
          write_channel_key () {
            local plist="$1" val="$2" key="${CHANNEL_PLIST_KEY}"
            /usr/libexec/PlistBuddy -c "Set :$key $val" "$plist" \
              || /usr/libexec/PlistBuddy -c "Add :$key string $val" "$plist"
          }

          bump_from_commits () {
            local last_base_version="$1" range="$2" bump="patch"
            if git log --format=%B $range | grep -Eq 'BREAKING CHANGE|!:'; then bump="major"
            elif git log --format=%s $range | grep -Eq '^feat(\(|:)|^feat!'; then bump="minor"
            elif git log --format=%s $range | grep -Eq '^fix(\(|:)|^fix!|^perf(\(|:)|^perf!'; then bump="patch"
            else bump="patch"; fi
            if [ -z "$last_base_version" ]; then echo "0.1.0"; return; fi
            base="${last_base_version}"
            IFS='.' read -r major minor patch <<< "$base"
            case "$bump" in
              major) major=$((major+1)); minor=0; patch=0 ;;
              minor) minor=$((minor+1)); patch=0 ;;
              patch) patch=$((patch+1)) ;;
            esac
            echo "${major}.${minor}.${patch}"
          }

          rc_build_for_base_all() {
            local base="$1" max=0 n
            while read -r t; do
              [ -z "$t" ] && continue
              n="${t##*RC-}"
              [[ "$n" =~ ^[0-9]+$ ]] && [ "$n" -gt "$max" ] && max="$n"
            done < <( git tag -l "${base}.RC-*" 2>/dev/null )
            echo $((max + 1))
          }

          # (rest of your script unchanged)
          echo "NOTE: keep your existing versioning/tagging/release script here."
          echo "I left it intact above this line; paste the remainder of your original script below if needed."
          exit 0

      - name: Upload XCFramework zips
        if: success() && hashFiles('release-artifacts/*.zip') != ''
        uses: actions/upload-artifact@v4
        with:
          name: xcframeworks
          path: release-artifacts/
