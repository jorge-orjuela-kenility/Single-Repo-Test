name: Release

on:
  pull_request:
    types: [closed]
    branches:
      - main
      - "release/*"
  workflow_dispatch:
    inputs:
      cut:
        description: "Release type"
        type: choice
        options: [rc, prod]
        required: false
      dry_run:
        description: "Preview only"
        type: boolean
        default: false
        required: false

permissions:
  contents: write
  pull-requests: read

jobs:
  build:
    if: |
      (github.event_name == 'pull_request' && github.event.pull_request.merged == true) ||
      (github.event_name == 'workflow_dispatch')
    runs-on: macos-15

    env:
      LBL_RC: cut-rc
      CHANNEL_PLIST_KEY: "TRVReleaseChannel"
      GH_TOKEN: ${{ secrets.GH_EXTERNAL_PAT }}
      SPM_CLONE_DIR: ${{ github.workspace }}/.spm-checkouts

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Git identity
        shell: bash
        run: |
          set -euo pipefail

          git config user.name  "truvideo[bot]"
          git config user.email "truvideo[bot]@users.noreply.github.com"

      - name: Install tooling
        run: |
          brew install jq xcodegen || true

      - name: Resolve cut type and frameworks
        id: scope
        shell: bash
        run: |
          set -euo pipefail
          chmod +x scripts/resolve_scope.sh
          scripts/resolve_scope.sh

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_16.4.app
          xcodebuild -version

      - name: Cache SwiftPM state
        uses: actions/cache@v4
        with:
          path: |
            .spm-checkouts
            DerivedData
            ~/Library/Caches/org.swift.swiftpm
            ~/Library/Developer/Xcode/SourcePackages
          key: spm-${{ runner.os }}-${{ hashFiles('project.yml', '**/Package.resolved', '**/Package.swift') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: Generate project
        run: make generate

      - name: Debug Tree view
        run: |
          set -euo pipefail
          if command -v tree >/dev/null; then
            tree -L 6
          else
            echo "tree not installed, falling back to find"
            find . -maxdepth 6 -print | sort
          fi

      #- name: Build project
       # run: make build SIM_DEST="generic/platform=iOS Simulator"

      - name: Compute version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          chmod +x scripts/compute_version.sh

          # Load scope file
          if [ -f "$GITHUB_WORKSPACE/.cut_release_scope" ]; then
            source "$GITHUB_WORKSPACE/.cut_release_scope"
          fi

          CUT_FINAL="${CUT:-}"
          if [ -z "$CUT_FINAL" ]; then
            CUT_FINAL="rc"
          fi

          echo "Using CUT=$CUT_FINAL"

          CUT="$CUT_FINAL" ./scripts/compute_version.sh > version.json
          cat version.json

          base="$(jq -r .base version.json)"
          full="$(jq -r .full version.json)"
          channel="$(jq -r .channel version.json)"
          build="$(jq -r .build version.json)"

          # Fail early if parsing failed
          if [ -z "$base" ] || [ "$base" = "null" ]; then
            echo "Version parsing failed."
            exit 1
          fi

          echo "base=$base" >> "$GITHUB_OUTPUT"
          echo "full=$full" >> "$GITHUB_OUTPUT"
          echo "channel=$channel" >> "$GITHUB_OUTPUT"
          echo "build=$build" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Apply version changes
        id: apply
        shell: bash
        run: |
          set -euo pipefail

          if [ ! -f "$GITHUB_WORKSPACE/.cut_release_scope" ]; then
            echo "Missing .cut_release_scope"
            exit 1
          fi
 
          source "$GITHUB_WORKSPACE/.cut_release_scope"

          base="${{ steps.version.outputs.base }}"
          full="${{ steps.version.outputs.full }}"
          channel="${{ steps.version.outputs.channel }}"
          build="${{ steps.version.outputs.build }}"
          
          if [ -z "${AFF:-}" ] || [ -z "$base" ] || [ -z "$full" ] || [ -z "$channel" ] || [ -z "$build" ]; then
            echo "Missing required env vars."
            echo "Required: AFF, VERSION_BASE, VERSION_FULL, CHANNEL, BUILD_NUM"
            exit 1
          fi

          chmod +x ./scripts/apply_version.sh

          AFF="$AFF" \
          VERSION_BASE="$base" \
          VERSION_FULL="$full" \
          CHANNEL="$channel" \
          BUILD_NUM="$build" \
          CHANNEL_PLIST_KEY="${CHANNEL_PLIST_KEY}" \
          ./scripts/apply_version.sh

      - name: Build XCFrameworks
        shell: bash
        run: |
          set -euo pipefail
          chmod +x scripts/build_xcframeworks.sh
          ./scripts/build_xcframeworks.sh