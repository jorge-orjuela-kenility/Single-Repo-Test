name: PR Size Check
on:
  pull_request:
    types: [opened, edited, synchronize, reopened, ready_for_review]

permissions:
  pull-requests: write

jobs:
  size:
    runs-on: ubuntu-latest
    steps:
      - name: Check PR size
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;

            const LINES_SOFT = 600;
            const LINES_HARD = 800;
            const FILES_SOFT = 20;
            const FILES_HARD = 40;
            const BYPASS_LABEL = 'skip-size-check';
            const SIZE_LABELS = ['size:xs','size:s','size:m','size:l','size:xl','size:xxl'];

            const labels = (pr.labels || []).map(l => l.name);
            if (labels.includes(BYPASS_LABEL)) {
              core.notice(`Bypassed by label: ${BYPASS_LABEL}`);
              return;
            }
            
            const isSwift = (filename) => filename.toLowerCase().endsWith('.swift');
            const isWorkflowFile = (filename) =>
              filename.startsWith('.github/workflows/') &&
              (filename.endsWith('.yml') || filename.endsWith('.yaml'));

            const makeSwiftCommentChecker = () => {
              // track block comment state per file
              const state = new Map(); // filename -> { inBlock: boolean }
              return (filename, line) => {
                // blank lines are ignored for Swift files
                const s = (state.get(filename) || { inBlock: false });
                let text = line.trim();
                if (text === '') return true;

                // If currently inside /* ... */ block
                if (s.inBlock) {
                  if (text.includes('*/')) {
                    s.inBlock = false;
                    // anything after */ counts as code if non-empty
                    const after = text.split('*/')[1] ?? '';
                    state.set(filename, s);
                    return after.trim() === '';
                  }
                  state.set(filename, s);
                  return true;
                }

                // Start of a new block comment?
                if (text.startsWith('/*')) {
                  // single line block comment?
                  if (!text.includes('*/')) {
                    s.inBlock = true;
                    state.set(filename, s);
                    return true;
                  }
                  // one-liner /** ... */ or /* ... */
                  const inner = text.replace(/\/\*|\*\//g, '').trim();
                  state.set(filename, s);
                  return inner === '';
                }

                // Lines like "*" often appear in block headers
                if (/^\*+/.test(text)) return true;

                // Single-line comments (// or ///)
                if (text.startsWith('//')) return true;

                return false; // counts as code
              };
            };

            const swiftIsCommentOnly = makeSwiftCommentChecker();

            // Compute effective counts
            let effectiveAdd = 0;
            let effectiveDel = 0;

            const files = await github.paginate(
              github.rest.pulls.listFiles,
              { owner: context.repo.owner, repo: context.repo.repo, pull_number: pr.number, per_page: 100 }
            );

            for (const f of files) {
              if (isWorkflowFile(f.filename)) {
                core.info(`Skipping workflow file: ${f.filename}`);
                continue;
              }
              
              const patch = f.patch;
              if (!patch) {
                // No patch for binaries/large files: use GitHub totals
                effectiveAdd += f.additions || 0;
                effectiveDel += f.deletions || 0;
                continue;
              }

              const swift = isSwift(f.filename);
              for (const raw of patch.split('\n')) {
                if (!raw) continue;
                if (raw.startsWith('@@') || raw.startsWith('+++') || raw.startsWith('---')) continue;

                if (raw.startsWith('+') && !raw.startsWith('+++')) {
                  const content = raw.slice(1);
                  if (swift) {
                    if (!swiftIsCommentOnly(f.filename, content)) effectiveAdd += 1;
                  } else {
                    effectiveAdd += 1;
                  }
                } else if (raw.startsWith('-') && !raw.startsWith('---')) {
                  const content = raw.slice(1);
                  if (swift) {
                    if (!swiftIsCommentOnly(f.filename, content)) effectiveDel += 1;
                  } else {
                    effectiveDel += 1;
                  }
                }
              }
            }

            const totalEffective = effectiveAdd + effectiveDel;
            const filesChanged = pr.changed_files;

            const sizeLabel =
              totalEffective > LINES_HARD ? 'size:xxl' :
              totalEffective >= LINES_SOFT ? 'size:xl' :
              totalEffective >= 300 ? 'size:l' :
              totalEffective >= 100 ? 'size:m' :
              totalEffective >= 20 ? 'size:s' : 'size:xs';

            const issue_number = pr.number;
            const owner = context.repo.owner;
            const repo  = context.repo.repo;

            // Remove previous size:* labels
            try {
              const currentLabels = await github.rest.issues.listLabelsOnIssue({owner, repo, issue_number});
              const toRemove = currentLabels.data.map(l => l.name).filter(n => SIZE_LABELS.includes(n));
              for (const n of toRemove) {
                await github.rest.issues.removeLabel({owner, repo, issue_number, name: n}).catch(() => {});
              }
            } catch {}

            // Add new label (best-effort)
            try {
              await github.rest.issues.addLabels({ owner, repo, issue_number, labels: [sizeLabel] });
            } catch {}

            const statusEmoji =
              (totalEffective > LINES_HARD || filesChanged > FILES_HARD) ? "❌" :
              (totalEffective >= LINES_SOFT || filesChanged >= FILES_SOFT) ? "⚠️" : "✅";

            const body = `${statusEmoji} **PR Size Report (Swift comments & blank lines ignored)**
            - Effective lines changed: **${totalEffective}** (warn ≥ ${LINES_SOFT}, fail > ${LINES_HARD})
              - additions: ${effectiveAdd}, deletions: ${effectiveDel}
            - Files changed: **${filesChanged}** (warn ≥ ${FILES_SOFT}, fail > ${FILES_HARD})
            - Size label: \`${sizeLabel}\`${labels.includes(BYPASS_LABEL) ? `\n- Bypassed by \`${BYPASS_LABEL}\`` : ''}`;

            await github.rest.issues.createComment({ owner, repo, issue_number, body });

            if (totalEffective > LINES_HARD || filesChanged > FILES_HARD) {
              core.setFailed(`PR too large (effective lines=${totalEffective}, files=${filesChanged}). Consider splitting.`);
            }
